<!DOCTYPE html>
<html lang="pl">
    <head>
        <meta charset="utf-8">
        <title>Search engine</title>
        <style>
            body {
                height: 100%;
                width: 100%;
                color: black;
                background-color: #FAF6EA;
                margin:0;
                }

                /*Nawigacja*/
            nav {
                width: 100%;
                height: 10vh;
                display: flex;
                flex-wrap: wrap;
                margin:0;
                }

            nav>div {
                width: 33%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                }

            #logo{
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
                }

            #navigation {
                justify-content: space-evenly;
                }

            #login>button {
                width: 100px;
                height: 30px;
                border-radius: 5px;
                background-color: #E8654B;
                border-color: black;
                color: black;
                }

            a {
                text-decoration: none;
                color: black
                }
        </style>
    </head>
    <body>
        <nav>
            <div id="navigation">
              <a href=#>ogłoszenia</a>
              <a href=#>o nas</a>
              <a href=#>kontakt</a>
            </div>
            <div id="logo">
              <h1>AMBITION LINK</h1>
            </div>
            <div id="login">
              <button id="btn">ZALOGUJ SIĘ</button>
            </div>
          </nav>
          <section>
            <form method="post">
                <label>
                    Tytuł ogłoszenia <input type="text" name="name" placeholder="Tytuł ogłoszenia">
                </label><br>
                <label>
                    Opis ogłoszenia <input type="text" name="description" placeholder="Opis ogłoszenia">
                </label><br>
                <label>
                    Data ogłoszenia <input type="date" name="date" placeholder="Data ogłoszenia">
                </label><br>
                <label>
                    Miejsce ogłoszenia <input type="text" name="place" placeholder="Miejsce ogłoszenia">
                </label><br>
                <button type="submit" value="Wyślij">Wyślij</button>
            </form>
          </section>

          
</html>
